name: Claude (interactive)

# Anyone can mention @claude in an issue or PR thread for interactive help.
# Boundaries per GOVERNANCE.md: advisory only — no merges, no closes.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # For @claude comments on PR threads, check out the PR head —
          # not main — so the action can see and diff the PR's files.
          ref: ${{ github.event.issue.pull_request && format('refs/pull/{0}/head', github.event.issue.number) || github.ref }}
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --system-prompt "You are the triage assistant for Waypoint, an open community hotspot system for amateur radio digital voice. Be technically precise, kind to newcomers (elmering is the culture), and honest about uncertainty. You advise; maintainers decide. Never promise merges or roadmap positions. When a question touches governance, cite GOVERNANCE.md."
