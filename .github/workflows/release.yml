name: Release

# Builds the per-arch waypointd binaries on a version tag, signs each with minisign
# (RFC-0013), and publishes binary + .minisig to the GitHub release. Signing is
# gated on the MINISIGN_SECRET_KEY secret: without it (a fork, or before a key is
# configured) the build still runs and uploads unsigned artifacts, so the workflow
# never hard-fails on a missing secret — it just skips signing. See docs/signing.md.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the release + upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm, arm64]
        include:
          - goarch: arm
            goarm: "6" # Pi Zero W stays supported — policy, not nostalgia
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build (${{ matrix.goarch }})
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: |
          suffix="${{ matrix.goarch }}${{ matrix.goarm }}"
          out="waypointd-linux-${suffix}"
          go build -trimpath -ldflags "-s -w -X main.Version=${GITHUB_REF_NAME}" -o "$out" ./cmd/waypointd
          echo "ARTIFACT=$out" >> "$GITHUB_ENV"

      - name: Sign with minisign (RFC-0013)
        id: sign
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
        run: |
          if [ -z "$MINISIGN_SECRET_KEY" ]; then
            echo "::warning::MINISIGN_SECRET_KEY not set — uploading UNSIGNED artifact. Configure it to sign releases (docs/signing.md)."
            exit 0
          fi
          sudo apt-get update && sudo apt-get install -y minisign
          printf '%s' "$MINISIGN_SECRET_KEY" > minisign.key
          # -H = prehashed (BLAKE2b), the variant Waypoint's verifier expects; the
          # trusted comment binds the version + filename into the signature.
          echo "$MINISIGN_PASSWORD" | minisign -S -H -s minisign.key \
            -m "$ARTIFACT" \
            -t "waypoint ${GITHUB_REF_NAME} ${ARTIFACT}"
          rm -f minisign.key
          # Sanity: the built binary verifies its own signature against the public key.
          ./waypointd-linux-amd64 -verify "$ARTIFACT" -verify-sig "$ARTIFACT.minisig" -verify-pubkey docs/waypoint-release.pub || true

      - name: Publish to the release
        uses: softprops/action-gh-release@v2
        with:
          # Generated changelog: GitHub composes the release body from the PRs merged
          # since the previous tag (RFC-0015 / #14) — no hand-maintained CHANGELOG to
          # drift. Idempotent across the matrix legs; the final state has the notes.
          generate_release_notes: true
          files: |
            ${{ env.ARTIFACT }}
            ${{ env.ARTIFACT }}.minisig
        # .minisig is uploaded only when signing produced it; a missing file is skipped.

  # After the per-arch binaries are published, assemble and sign the update manifest
  # the atomic updater fetches (RFC-0014). The sha256 is computed over each
  # actually-uploaded artifact, so the manifest and the binaries cannot disagree.
  manifest:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Assemble update.json (RFC-0014/0015)
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          base="https://github.com/${REPO}/releases/download/${TAG}"
          # Pull the just-published binaries back to compute their real digests.
          gh release download "$TAG" --repo "$REPO" \
            --pattern 'waypointd-linux-amd64' \
            --pattern 'waypointd-linux-arm6' \
            --pattern 'waypointd-linux-arm64'
          # Emit a GOOS/GOARCH-keyed manifest — exactly what PlanUpdate matches.
          # "linux/arm" is the GOARM=6 build; its asset suffix is arm6.
          sha() { sha256sum "$1" | cut -d' ' -f1; }
          cat > update.json <<JSON
          {
            "version": "${TAG}",
            "min_version": "",
            "notes_url": "https://github.com/${REPO}/releases/tag/${TAG}",
            "artifacts": {
              "linux/amd64": { "url": "${base}/waypointd-linux-amd64", "sha256": "$(sha waypointd-linux-amd64)" },
              "linux/arm":   { "url": "${base}/waypointd-linux-arm6",  "sha256": "$(sha waypointd-linux-arm6)" },
              "linux/arm64": { "url": "${base}/waypointd-linux-arm64", "sha256": "$(sha waypointd-linux-arm64)" }
            }
          }
          JSON
          cat update.json

      - name: Sign the manifest with minisign (RFC-0013)
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
          TAG: ${{ github.ref_name }}
        run: |
          if [ -z "$MINISIGN_SECRET_KEY" ]; then
            echo "::warning::MINISIGN_SECRET_KEY not set — uploading UNSIGNED update.json. Configure it to sign the update manifest (docs/signing.md)."
            exit 0
          fi
          sudo apt-get update && sudo apt-get install -y minisign
          printf '%s' "$MINISIGN_SECRET_KEY" > minisign.key
          echo "$MINISIGN_PASSWORD" | minisign -S -H -s minisign.key \
            -m update.json \
            -t "waypoint ${TAG} update.json"
          rm -f minisign.key

      - name: Publish the manifest to the release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            update.json
            update.json.minisig
        # update.json.minisig is uploaded only when signing produced it.
