name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm, arm64]
        include:
          - goarch: arm
            goarm: "6" # Pi Zero W stays supported — this is policy, not nostalgia
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Build (${{ matrix.goarch }})
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags "-s -w -X main.Version=${GITHUB_SHA::8}" ./cmd/waypointd
