# Waypoint: keep the journal in RAM, not on the SD card (SD longevity).
#
# A hotspot logs continuously (MQTT feed, gateway churn); writing that to the SD
# card wears it out — the incumbent Pi-Star/WPSD failure mode. Storage=volatile
# keeps the journal in a tmpfs ring buffer under /run/log/journal, bounded so it
# never grows into memory pressure. Nothing in Waypoint assumes a persistent
# /var/log: the operator-facing event history is SQLite (RFC-0004), the live
# status is MQTT/SSE (RFC-0008), and update state is the store + marker — none of
# it reads the journal back.
[Journal]
Storage=volatile
RuntimeMaxUse=32M
RuntimeMaxFileSize=8M
