# Waypoint: never let a library upgrade auto-restart services.
#
# A hotspot holds /dev/ttyAMA0 open for the modem. If needrestart bounced
# MMDVMHost (or the gateways) when unattended-upgrades pulls in, say, a new
# libc/libssl, an in-progress QSO would drop and the modem link would flap. So:
#
#   $nrconf{restart} = 'l'   — only LIST services needing a restart; never restart
#                             them automatically. waypointd owns service lifecycle
#                             and cycles the stack deliberately on its own updates.
#   $nrconf{kernelhints} = -1 — never nag/act on a new kernel (we also hold the
#                             kernel out of unattended-upgrades entirely).
$nrconf{restart} = 'l';
$nrconf{kernelhints} = -1;
