<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Waypoint · Settings</title>
<link rel="icon" type="image/svg+xml" href="/logo.svg">
<style>
  /* Waypoint settings — "Nocturne" phosphor theme, adapted from the Claude
     Design mockup. Self-contained and offline-safe: no external font/CDN, since
     a hotspot may have no internet. Fonts fall back through the stack. */
  :root {
    --accent: #35d07f; --accent-soft: rgba(53,208,127,0.13); --accent-glow: rgba(53,208,127,0.4);
    --bg: #06070a; --panel: #0f1218; --panel-line: #1c222c; --field: #0a0d12; --field-line: #262c38;
    --side: #0b0d12; --side-line: #14181f; --row-line: #171b23;
    /* --dim/--faint raised to meet WCAG AA (4.5:1) as small de-emphasised text
       on the darkest panels; the old #5a6472/#4a5361 sat at ~3:1 and failed. */
    --ink: #e4ebf4; --ink-head: #eef2f7; --ink-body: #c7cfdb; --label: #8a94a6; --muted: #7f8a99; --dim: #828c9b; --faint: #767f8c;
    --bad: #ff6b6b; --warn: #ff9f45;
    --mono: "IBM Plex Mono", ui-monospace, "SF Mono", "Cascadia Code", Consolas, Menlo, monospace;
    --sans: "Space Grotesk", system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
  }
  :root[data-theme="amber"] { --accent: #f0a935; --accent-soft: rgba(240,169,53,0.13); --accent-glow: rgba(240,169,53,0.45); }
  :root[data-theme="ice"]   { --accent: #4db8ff; --accent-soft: rgba(77,184,255,0.13); --accent-glow: rgba(77,184,255,0.45); }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: radial-gradient(ellipse 90% 60% at 78% -10%, var(--accent-soft), transparent 55%), var(--bg);
    color: var(--ink-body); font-family: var(--sans); min-height: 100vh;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  /* Links sitting inside body text are underlined so they're distinguishable
     without relying on colour (WCAG 1.4.1). */
  .note a, .pagehead p a { text-decoration: underline; }
  ::selection { background: var(--accent-soft); }
  input, select, textarea { font-family: var(--mono); }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: #0a0c10; }
  ::-webkit-scrollbar-thumb { background: #232a35; border-radius: 6px; border: 2px solid #0a0c10; }
  @keyframes wpblink { 0%,100% { opacity: 1; } 50% { opacity: .35; } }

  .app { min-height: 100vh; display: grid; grid-template-columns: 264px 1fr; }

  /* sidebar */
  aside { border-right: 1px solid var(--side-line); background: linear-gradient(180deg, var(--side), #08090d); display: flex; flex-direction: column; min-height: 100vh; }
  .brand { padding: 22px 22px 20px; border-bottom: 1px solid var(--side-line); }
  .brand-row { display: flex; align-items: center; gap: 11px; }
  .brand-name { font-size: 16px; font-weight: 700; letter-spacing: 2.5px; color: var(--ink-head); }
  .brand-sub { font-family: var(--mono); font-size: 9.5px; letter-spacing: 2px; color: var(--dim); margin-top: 1px; }
  .callsign-chip { margin-top: 16px; display: flex; align-items: center; justify-content: space-between; background: #0c0f15; border: 1px solid #1a1f28; border-radius: 7px; padding: 8px 11px; }
  .chip-k { font-family: var(--mono); font-size: 9px; letter-spacing: 1.5px; color: var(--dim); }
  .chip-v { font-family: var(--mono); font-size: 15px; font-weight: 600; color: var(--accent); letter-spacing: 1px; }
  .online { display: flex; align-items: center; gap: 6px; }
  .online .led { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent-glow); animation: wpblink 2.4s ease-in-out infinite; }
  .online .txt { font-family: var(--mono); font-size: 9px; letter-spacing: 1px; color: var(--muted); }

  nav { padding: 14px 12px; flex: 1; }
  .nav-head { font-family: var(--mono); font-size: 9px; letter-spacing: 2px; color: var(--faint); padding: 0 10px 10px; }
  .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px; margin: 2px 0; border-radius: 8px; cursor: pointer; position: relative; background: transparent; border: 0; width: 100%; text-align: left; }
  .nav-item:hover { background: rgba(255,255,255,0.02); }
  .nav-item .bar { position: absolute; left: -12px; top: 8px; bottom: 8px; width: 3px; border-radius: 0 3px 3px 0; background: transparent; }
  .nav-item .tag { flex: none; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; border-radius: 7px; font-family: var(--mono); font-size: 12px; font-weight: 600; letter-spacing: .5px; border: 1px solid var(--field-line); color: var(--muted); background: #0c0f15; }
  .nav-item .label { font-size: 13.5px; font-weight: 500; color: var(--ink-body); letter-spacing: .2px; }
  .nav-item .sub { font-family: var(--mono); font-size: 9.5px; letter-spacing: .5px; color: var(--dim); margin-top: 1px; }
  .nav-item.on { background: var(--accent-soft); }
  .nav-item.on .bar { background: var(--accent); }
  .nav-item.on .tag { border-color: var(--accent); color: var(--accent); background: rgba(0,0,0,.25); }
  .nav-item.on .label { color: var(--ink-head); font-weight: 600; }

  .theme-pick { padding: 14px 18px 18px; border-top: 1px solid var(--side-line); }
  .theme-head { font-family: var(--mono); font-size: 9px; letter-spacing: 2px; color: var(--faint); margin-bottom: 9px; }
  .swatches { display: flex; gap: 7px; }
  .swatch { flex: 1; display: flex; align-items: center; justify-content: center; padding: 9px 0; border-radius: 7px; cursor: pointer; background: #0b0e13; border: 1px solid #1a1f28; }
  .swatch .dot { width: 12px; height: 12px; border-radius: 50%; }
  .swatch.on { background: #12161d; }

  /* main */
  main { min-width: 0; display: flex; flex-direction: column; max-height: 100vh; overflow: hidden; }
  .statusbar { border-bottom: 1px solid var(--side-line); background: rgba(9,11,15,.72); backdrop-filter: blur(6px); padding: 13px 30px; display: flex; align-items: center; gap: 28px; flex-wrap: wrap; }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat .k { font-family: var(--mono); font-size: 9px; letter-spacing: 1.5px; color: #525c6a; }
  .stat .v { font-family: var(--mono); font-size: 13px; font-weight: 600; color: #dfe6f0; }
  .stat .v.accent { color: var(--accent); }
  .leds { margin-left: auto; display: flex; align-items: center; gap: 14px; }
  .led-mode { display: flex; align-items: center; gap: 5px; }
  .led-mode .d { width: 8px; height: 8px; border-radius: 50%; background: #252b34; }
  .led-mode.on .d { background: var(--accent); box-shadow: 0 0 7px var(--accent-glow); }
  .led-mode .a { font-family: var(--mono); font-size: 9.5px; letter-spacing: .5px; color: #454e5c; }
  .led-mode.on .a { color: #cfd6e0; }

  .scroll { flex: 1; overflow-y: auto; padding: 30px 34px 60px; }
  .pagehead { display: flex; align-items: flex-end; justify-content: space-between; gap: 20px; margin-bottom: 26px; }
  .crumb { font-family: var(--mono); font-size: 10px; letter-spacing: 2.5px; color: var(--accent); margin-bottom: 7px; }
  .pagehead h1 { margin: 0; font-size: 27px; font-weight: 600; letter-spacing: -.3px; color: var(--ink-head); }
  .pagehead p { margin: 7px 0 0; font-size: 13.5px; color: var(--muted); max-width: 560px; line-height: 1.5; }
  .actions { display: flex; gap: 10px; flex: none; align-items: center; }
  .btn { font-family: var(--mono); font-size: 12px; letter-spacing: .5px; border-radius: 7px; padding: 10px 16px; cursor: pointer; }
  .btn.ghost { color: #9aa4b2; background: #0e1117; border: 1px solid #232a35; }
  .btn.primary { font-weight: 600; color: var(--bg); background: var(--accent); border: 1px solid var(--accent); box-shadow: 0 0 16px var(--accent-soft); padding: 10px 18px; }
  .btn[disabled] { opacity: .5; cursor: not-allowed; box-shadow: none; }
  .ro-badge { font-family: var(--mono); font-size: 10px; letter-spacing: 1px; color: var(--warn); border: 1px solid rgba(255,159,69,.35); border-radius: 4px; padding: 5px 9px; }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }
  .stack { display: flex; flex-direction: column; gap: 20px; }
  @media (max-width: 900px) { .app { grid-template-columns: 1fr; } aside { min-height: auto; } .grid2 { grid-template-columns: 1fr; } }

  .card { background: var(--panel); border: 1px solid var(--panel-line); border-radius: 11px; padding: 6px 22px 18px; }
  .card-head { display: flex; align-items: center; gap: 8px; padding: 16px 0 6px; }
  .card-head .sq { width: 6px; height: 6px; background: var(--accent); border-radius: 1px; }
  .card-head .t { font-family: var(--mono); font-size: 11px; letter-spacing: 2px; color: #aeb7c4; }
  .row { display: grid; grid-template-columns: 150px 1fr; gap: 14px; align-items: center; padding: 12px 0; border-top: 1px solid var(--row-line); }
  .row label { font-size: 12.5px; color: var(--label); }
  .row input, .row select { background: var(--field); border: 1px solid var(--field-line); border-radius: 6px; padding: 9px 11px; color: var(--ink); font-size: 13px; width: 100%; }
  .row input[readonly], .row select[disabled] { opacity: .85; }
  .row .accent { color: var(--accent); }
  .unit { display: flex; align-items: center; gap: 8px; }
  .unit .u { font-family: var(--mono); font-size: 11px; color: var(--dim); }

  .toggle-row { display: flex; align-items: center; justify-content: space-between; background: #0b0e13; border: 1px solid #1a1f28; border-radius: 8px; padding: 11px 14px; margin-top: 10px; }
  .toggle-row .name { font-size: 12.5px; color: var(--ink-body); }
  .pill { font-family: var(--mono); font-size: 10px; border-radius: 4px; padding: 3px 8px; }
  .pill.on { color: var(--accent); border: 1px solid var(--accent); }
  .pill.off { color: var(--dim); border: 1px solid #2a3140; }

  .modes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 16px; }
  .mode-card { background: var(--panel); border: 1px solid var(--panel-line); border-radius: 11px; padding: 18px 20px; }
  .mode-card.on { border-color: rgba(120,140,160,.28); }
  .mode-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; }
  .mode-name { font-size: 16px; font-weight: 600; color: var(--ink-head); }
  .mode-desc { font-family: var(--mono); font-size: 10.5px; color: var(--muted); margin-top: 3px; }
  .track { flex: none; width: 46px; height: 26px; border-radius: 13px; padding: 3px; display: flex; background: #181d26; border: 1px solid #2a3140; justify-content: flex-start; }
  .track .knob { width: 18px; height: 18px; border-radius: 50%; background: #6b7688; }
  .mode-card.on .track { background: var(--accent-soft); border-color: var(--accent); justify-content: flex-end; }
  .mode-card.on .track .knob { background: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }
  .mode-foot { display: flex; align-items: center; gap: 8px; margin-top: 16px; padding-top: 13px; border-top: 1px solid var(--row-line); }
  .mode-foot .d { width: 7px; height: 7px; border-radius: 50%; background: #333b46; }
  .mode-card.on .mode-foot .d { background: var(--accent); box-shadow: 0 0 6px var(--accent-glow); }
  .mode-foot .s { font-family: var(--mono); font-size: 10px; letter-spacing: 1.5px; color: var(--dim); }
  .mode-card.on .mode-foot .s { color: var(--accent); }

  .netname { flex: 1; background: transparent; border: none; border-bottom: 1px solid transparent; color: #aeb7c4; font-family: var(--mono); font-size: 11px; letter-spacing: 2px; padding: 2px 0; }
  .netname:hover { border-bottom-color: var(--field-line); }
  .netname:focus { border-bottom-color: var(--accent); box-shadow: none; }
  .netdel { background: transparent; border: 1px solid #2a3140; color: var(--dim); border-radius: 6px; width: 26px; height: 26px; cursor: pointer; font-size: 13px; flex: none; }
  .netdel:hover { color: var(--bad); border-color: var(--bad); }
  .rewrites { width: 100%; background: var(--field); border: 1px solid var(--field-line); border-radius: 6px; padding: 9px 11px; color: var(--ink); font-size: 12px; line-height: 1.6; resize: vertical; }
  .row textarea { grid-column: 2; }
  .note { background: var(--panel); border: 1px dashed var(--panel-line); border-radius: 11px; padding: 22px; color: var(--muted); font-size: 13px; line-height: 1.6; }
  .note b { color: var(--ink-body); }

  /* DMR routing builder */
  .catch-ctl { display: flex; align-items: center; gap: 8px; }
  .route-block { margin-top: 14px; }
  .route-title { font-family: var(--mono); font-size: 9px; letter-spacing: 2px; color: var(--faint); margin: 4px 0 9px; }
  .route-head, .route-row { display: grid; grid-template-columns: 62px 1fr 16px 1fr 58px 26px; gap: 8px; align-items: center; }
  .route-head { font-family: var(--mono); font-size: 8.5px; letter-spacing: 1px; color: var(--faint); padding: 0 2px 5px; }
  .route-row { margin-bottom: 7px; }
  .route-row .arr { text-align: center; color: var(--dim); font-size: 12px; }
  .mini { background: var(--field); border: 1px solid var(--field-line); border-radius: 6px; padding: 7px 9px; color: var(--ink); font-size: 12px; font-family: var(--mono); width: 100%; }
  .route-empty { font-family: var(--mono); font-size: 11px; color: var(--dim); padding: 2px 2px 9px; }
  .mini-btn { margin-top: 4px; padding: 7px 12px; font-size: 11px; }
  .route-warn { margin-top: 11px; font-family: var(--mono); font-size: 11px; color: var(--warn); background: rgba(255,159,69,.08); border: 1px solid rgba(255,159,69,.3); border-radius: 8px; padding: 9px 12px; }
  details.raw-adv { margin-top: 14px; }
  details.raw-adv summary { font-family: var(--mono); font-size: 10px; letter-spacing: 1px; color: var(--muted); cursor: pointer; padding: 4px 0; list-style: none; }
  details.raw-adv summary::before { content: "▸ "; color: var(--dim); }
  details.raw-adv[open] summary::before { content: "▾ "; }
  details.raw-adv textarea { margin-top: 9px; }
  /* LCD page builder */
  .lcd-page { padding: 6px 20px 16px; }
  .lcd-pagehead { gap: 10px; flex-wrap: wrap; }
  .lcd-pagename { flex: 1; min-width: 130px; background: var(--field); border: 1px solid var(--field-line); border-radius: 6px; padding: 7px 10px; color: var(--ink); font-family: var(--mono); font-size: 12px; }
  .lcd-dur { display: inline-flex; align-items: center; gap: 5px; font-family: var(--mono); font-size: 11px; color: var(--dim); }
  .lcd-dur input { width: 52px; background: var(--field); border: 1px solid var(--field-line); border-radius: 6px; padding: 6px 8px; color: var(--ink); font-family: var(--mono); font-size: 12px; }
  .lcd-line { display: grid; grid-template-columns: 56px 1fr; gap: 10px; align-items: center; padding: 5px 0; }
  .lcd-linelabel { font-family: var(--mono); font-size: 11px; color: var(--label); }
  .lcd-lineinput { width: 100%; background: var(--field); border: 1px solid var(--field-line); border-radius: 6px; padding: 8px 10px; color: var(--ink); font-family: var(--mono); font-size: 12px; }
  .lcd-tokens { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 11px; }
  .lcd-tok { font-family: var(--mono); font-size: 10.5px; color: var(--muted); background: #0c0f15; border: 1px solid var(--field-line); border-radius: 5px; padding: 4px 7px; cursor: pointer; }
  .lcd-tok:hover { color: var(--accent); border-color: var(--accent); }
  .lcd-warn { margin-top: 11px; font-family: var(--mono); font-size: 11px; color: var(--warn); background: rgba(255,159,69,.08); border: 1px solid rgba(255,159,69,.3); border-radius: 8px; padding: 8px 11px; }
  /* page reorder + interrupt controls in the page head */
  .lcd-move { font-family: var(--mono); font-size: 12px; line-height: 1; color: var(--muted); background: #0c0f15; border: 1px solid var(--field-line); border-radius: 5px; padding: 5px 8px; cursor: pointer; }
  .lcd-move:hover:not(:disabled) { color: var(--accent); border-color: var(--accent); }
  .lcd-move:disabled { opacity: .35; cursor: default; }
  /* live client-side preview, a monospace facsimile of the panel */
  .lcd-preview { margin-top: 12px; }
  .lcd-preview-label { font-family: var(--mono); font-size: 10px; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; margin-bottom: 5px; }
  .lcd-screen { display: inline-block; font-family: var(--mono); font-size: 13px; line-height: 1.5; white-space: pre; color: #7dff9b; background: #071a0d; border: 1px solid #123; border-radius: 6px; padding: 8px 10px; letter-spacing: 1px; }
  /* token reference legend */
  .lcd-legend { margin-top: 4px; }
  .lcd-legend summary { font-family: var(--mono); font-size: 10px; letter-spacing: 1px; color: var(--muted); cursor: pointer; padding: 4px 0; }
  .lcd-legend dl { display: grid; grid-template-columns: max-content 1fr; gap: 4px 14px; margin: 8px 0 0; }
  .lcd-legend dt { font-family: var(--mono); font-size: 11px; color: var(--accent); }
  .lcd-legend dd { margin: 0; font-size: 11.5px; color: var(--dim); }
  .note code { font-family: var(--mono); font-size: 11px; color: var(--accent); background: rgba(255,255,255,.04); padding: 1px 4px; border-radius: 3px; }
  /* pill toggles rendered as real buttons (keyboard-operable) */
  button.pill { background: transparent; cursor: pointer; }
  /* mode tiles are real buttons — reset the UA chrome so they look like cards */
  button.mode-card { width: 100%; text-align: left; cursor: pointer; font: inherit; color: inherit; }
  /* visible focus for every interactive control, keyboard-only */
  button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible,
  .pill:focus-visible, .mode-card:focus-visible, .nav-item:focus-visible, .swatch:focus-visible,
  .lcd-tok:focus-visible, .netdel:focus-visible, a:focus-visible {
    outline: 2px solid var(--accent); outline-offset: 2px;
  }

  /* Skip link — hidden until focused, then pinned top-left over everything. */
  .skip-link { position: fixed; left: 8px; top: -60px; z-index: 100; background: var(--panel); color: var(--ink-head);
    border: 1px solid var(--accent); border-radius: 7px; padding: 9px 14px; font-family: var(--mono); font-size: 12px;
    transition: top .15s ease; }
  .skip-link:focus { top: 8px; text-decoration: none; outline: 2px solid var(--accent); outline-offset: 2px; }
  /* Visually-hidden but read by screen readers. */
  .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden;
    clip: rect(0 0 0 0); white-space: nowrap; border: 0; }

  .hide { display: none; }
</style>
</head>
<body>
<a class="skip-link" href="#main">Skip to settings</a>
<div class="app" id="app">
  <aside>
    <div class="brand">
      <a class="brand-row" href="/" style="text-decoration:none;" title="Back to dashboard">
        <svg width="27" height="27" viewBox="0 0 512 512" style="flex:none;" fill="var(--accent)" aria-hidden="true"><path d="M256 474 C201 410 138 362 138 284 A118 118 0 0 1 374 284 C374 362 311 410 256 474 Z"></path><path d="M247 302 L265 302 L259 128 L253 128 Z"></path><circle cx="256" cy="110" r="16"></circle><g fill="none" stroke="var(--accent)" stroke-width="13" stroke-linecap="round"><path d="M216 80 Q188 110 216 140"></path><path d="M196 60 Q156 110 196 160"></path><path d="M296 80 Q324 110 296 140"></path><path d="M316 60 Q356 110 316 160"></path></g><circle cx="256" cy="288" r="46" fill="#0b0d12"></circle></svg>
        <div>
          <div class="brand-name">WAYPOINT</div>
          <div class="brand-sub">HOTSPOT CONTROL</div>
        </div>
      </a>
      <div class="callsign-chip">
        <div>
          <div class="chip-k">CALLSIGN</div>
          <div class="chip-v" id="side-callsign">—</div>
        </div>
        <div class="online"><span class="led"></span><span class="txt">ONLINE</span></div>
      </div>
    </div>
    <nav id="nav" aria-label="Configuration sections">
      <div class="nav-head">CONFIGURATION</div>
    </nav>
    <div class="theme-pick">
      <div class="theme-head" id="theme-head">DISPLAY THEME</div>
      <div class="swatches" id="swatches" role="group" aria-labelledby="theme-head"></div>
    </div>
  </aside>

  <main id="main">
    <div class="statusbar">
      <div class="stat"><span class="k">DASHBOARD</span><span class="v" id="st-version">—</span></div>
      <div class="stat"><span class="k">MODE</span><span class="v accent" id="st-mode">—</span></div>
      <div class="stat"><span class="k">UPTIME</span><span class="v" id="st-uptime">—</span></div>
      <div class="stat"><span class="k">FEED</span><span class="v" id="st-feed">—</span></div>
      <div class="leds" id="leds"></div>
    </div>

    <div class="scroll">
      <div class="pagehead">
        <div>
          <div class="crumb" id="crumb">—</div>
          <h1 id="title">Settings</h1>
          <p id="desc"></p>
        </div>
        <div class="actions">
          <span class="ro-badge hide" id="ro-badge"></span>
          <button class="btn ghost" id="btn-reset" disabled>RESET</button>
          <button class="btn primary" id="btn-apply" disabled>APPLY CHANGES</button>
        </div>
      </div>
      <div id="panels"></div>
    </div>
  </main>
</div>

<script src="settings.js"></script>
</body>
</html>
